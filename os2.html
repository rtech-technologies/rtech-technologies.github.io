<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS*2 - RTECH-technologies</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans overflow-hidden">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-900/20 via-black to-black"></div>

    <nav class="relative z-10 p-6 max-w-6xl mx-auto">
        <a href="index.html" class="text-gray-400 hover:text-white transition">&larr; Back to Home</a>
    </nav>

    <main class="relative z-10 flex flex-col items-center justify-center min-h-[90vh] text-center px-4">
        <div class="mb-8">
            <span class="text-blue-500 font-mono tracking-widest uppercase text-sm">Next Generation OS</span>
        </div>
        <h1 class="text-6xl md:text-9xl font-black mb-4 tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-600">
            OS*2
        </h1>
        <p class="text-2xl md:text-4xl font-light text-gray-300 mb-12 animate-pulse">
            coming soon!!
        </p>

        <div class="max-w-md w-full h-1 bg-gray-800 rounded-full overflow-hidden">
            <div class="h-full bg-blue-600 w-1/3 animate-[loading_3s_ease-in-out_infinite]"></div>
        </div>

        <style>
            @keyframes loading {
                0% { width: 0%; transform: translateX(0%); }
                50% { width: 50%; transform: translateX(50%); }
                100% { width: 0%; transform: translateX(100%); }
            }
        </style>
    </main>

    <footer class="relative z-10 p-6 text-center text-gray-600 text-sm">
        RTECH-technologies Research & Development
    </footer>
</body>
</html>
