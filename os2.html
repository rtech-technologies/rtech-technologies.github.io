<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTECH | Enterprise Deployment Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --lime: #a3e635; --slate-950: #020617; }
        * { border-radius: 0 !important; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--slate-950); color: #f8fafc; line-height: 1.5; }
        
        .enterprise-border { border: 1px solid #334155; }
        .status-pulse {
            width: 8px;
            height: 8px;
            background-color: var(--lime);
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
        
        #download-btn {
            font-weight: 800;
            padding: 12px 32px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-size: 0.875rem;
        }

        .btn-ready {
            background: var(--lime);
            color: #000;
            cursor: pointer;
            border: 1px solid var(--lime);
        }

        .btn-ready:hover {
            background: #fff;
            border-color: #fff;
        }

        .btn-pending {
            background: transparent;
            color: #475569;
            cursor: not-allowed;
            border: 1px solid #1e293b;
        }
    </style>
</head>
<body class="selection:bg-lime-500 selection:text-black">

    <nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 flex justify-between h-16 items-center">
            <div class="flex items-center gap-10">
                <a href="index.html" class="font-black text-xl tracking-tighter hover:text-lime-500 transition-colors uppercase">RTECH</a>
                <div class="hidden md:flex gap-8 text-[10px] font-bold uppercase tracking-widest text-slate-500">
                    <span class="text-white">Deployment_Portal</span>
                </div>
            </div>
            <div class="text-[10px] font-black uppercase px-3 py-1 border border-slate-700">
                Cycle: 2026.Q2
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-20">
        <section class="mb-20">
            <div class="flex items-center gap-3 mb-6">
                <span class="status-pulse"></span>
                <span class="text-[10px] font-bold uppercase tracking-[0.4em] text-lime-500" id="system-status">Checking System Availability...</span>
            </div>
            <h1 class="text-5xl md:text-7xl font-extrabold mb-8 tracking-tighter italic uppercase">
                OS*2 <span class="text-slate-500">Limemade</span>
            </h1>
        </section>

        <div class="grid lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 border border-slate-800 p-8 md:p-12 bg-slate-900/10 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start mb-10">
                        <h2 class="text-2xl font-black uppercase italic">Primary_Kernel_Image</h2>
                        <span class="text-[10px] font-bold bg-slate-800 px-2 py-1 text-slate-400">BUILD_2026_RC1</span>
                    </div>
                    
                    <div class="space-y-4 mb-12">
                        <div class="flex justify-between border-b border-slate-800 pb-2">
                            <span class="text-xs text-slate-500 uppercase font-bold">SHA-256</span>
                            <span class="text-xs font-mono text-slate-400" id="hash-id">----------------</span>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col md:flex-row gap-4">
                    <button id="download-btn" class="btn-pending">
                        Initializing...
                    </button>
                    
                    <button class="border border-slate-700 text-white px-8 py-3 font-bold text-sm hover:bg-slate-800 transition-all uppercase">
                        Request_Key
                    </button>
                </div>
            </div>

            <div class="enterprise-border p-8 bg-slate-950">
                <h3 class="text-xs font-black uppercase text-lime-500 mb-6 tracking-widest">Specifications</h3>
                <ul class="text-[11px] font-bold uppercase space-y-4 text-slate-400">
                    <li>CPU: RTECH R1-SERIES</li>
                    <li>PROPERTY: USER_OWNED</li>
                    <li>YEAR: 2026</li>
                </ul>
            </div>
        </div>
    </main>

    <script>
        /**
         * OS*2 Deployment Logic
         * Checks for local build presence
         */
        async function checkAvailability() {
            const btn = document.getElementById('download-btn');
            const status = document.getElementById('system-status');
            const hash = document.getElementById('hash-id');
            
            // Set this to the actual path of the ISO or Build file
            const targetPath = 'builds/os2_v2.iso'; 

            try {
                const response = await fetch(targetPath, { method: 'HEAD' });
                
                if (response.ok) {
                    btn.innerText = "Download Now";
                    btn.className = "btn-ready";
                    btn.onclick = () => window.location.href = targetPath;
                    status.innerText = "System Ready for Deployment";
                    hash.innerText = "f2c9e4a8b1d3...";
                } else {
                    throw new Error('Not found');
                }
            } catch (error) {
                btn.innerText = "Coming Soon 2026";
                btn.className = "btn-pending";
                status.innerText = "Staging in Progress";
                hash.innerText = "PENDING_RELEASE";
            }
        }

        // Execute on load
        window.onload = checkAvailability;
    </script>

    <footer class="border-t border-slate-800 py-12 px-6 mt-20">
        <div class="max-w-7xl mx-auto text-[9px] font-bold uppercase tracking-[0.3em] text-slate-600">
            RTECH_ENTERPRISE_DEPLOYMENT // 2026 // ALL_RIGHTS_USER_OWNED
        </div>
    </footer>

</body>
</html>
